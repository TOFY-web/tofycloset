// ─── AUTH HOOK ────────────────────────────────────────────────────────────────
function useAuth() {
  const [user, setUser]       = useState(null);
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const unsub = fb.auth.onAuthStateChanged(async (firebaseUser) => {
      if (firebaseUser) {
        setUser(firebaseUser);
        const p = await fb.db.getProfile(firebaseUser.uid);
        setProfile(p);
      } else {
        setUser(null);
        setProfile(null);
      }
      setLoading(false);
    });
    return unsub;
  }, []);

  const signIn = async (email, password) => {
    try {
      await fb.auth.signIn(email, password);
      return { success: true };
    } catch(e) {
      return { success: false, error: friendlyError(e.code) };
    }
  };

  const signUp = async (email, password, fullName) => {
    try {
      const { user } = await fb.auth.signUp(email, password, fullName);
      await fb.db.saveProfile(user.uid, { full_name: fullName, email, created_at: new Date().toISOString() });
      return { success: true };
    } catch(e) {
      return { success: false, error: friendlyError(e.code) };
    }
  };

  const signOut = async () => {
    await fb.auth.signOut();
  };

  const saveProfile = async (updates) => {
    if (!user) return;
    await fb.db.saveProfile(user.uid, updates);
    setProfile(p => ({ ...p, ...updates }));
  };

  return { user, profile, loading, signIn, signUp, signOut, saveProfile };
}

function friendlyError(code) {
  const map = {
    "auth/user-not-found":      "No account found with that email.",
    "auth/wrong-password":      "Incorrect password. Try again.",
    "auth/email-already-in-use":"An account with this email already exists.",
    "auth/weak-password":       "Password must be at least 6 characters.",
    "auth/invalid-email":       "Please enter a valid email address.",
    "auth/too-many-requests":   "Too many attempts. Please try again later.",
    "auth/network-request-failed": "Network error. Check your connection.",
  };
  return map[code] || "Something went wrong. Please try again.";
}

// Score each item against the user's quiz answers
// Returns a sorted array of { slot, item, score }
function getRecommendations(quizAnswers) {
  if (!quizAnswers || Object.keys(quizAnswers).length === 0) return [];
  const { vibe, occasion, palette } = quizAnswers;
  const scored = [];

  Object.entries(CATALOG).forEach(([slot, items]) => {
    items.forEach(item => {
      if (item.price === 0) return; // skip "none" items
      let score = 0;

      // Vibe match
      if (vibe && STYLE_MAP.vibe[vibe]?.includes(item.id)) score += 3;

      // Occasion match
      if (occasion && STYLE_MAP.occasion[occasion]?.includes(item.id)) score += 2;

      // Palette match — check if any variant colour matches
      if (palette) {
        const palColours = STYLE_MAP.palette[palette] || [];
        const hasMatch = item.variants.some(v => palColours.some(c => v.label.toLowerCase().includes(c.toLowerCase())));
        if (hasMatch) score += 2;
      }

      if (score > 0) scored.push({ slot, item, score });
    });
  });

  // Sort by score desc, then deduplicate to one item per slot (highest score wins)
  scored.sort((a, b) => b.score - a.score);
  const seen = new Set();
  const top = [];
  scored.forEach(r => {
    if (!seen.has(r.slot)) { seen.add(r.slot); top.push(r); }
  });
  // Also include all other high-scorers (not just top-per-slot) for the full list
  return scored;
}

// Build a full recommended outfit from quiz answers
function buildRecommendedOutfit(quizAnswers) {
  const recs = getRecommendations(quizAnswers);
  const outfit = { ...DEFAULT_OUTFIT };
  const slots = ["Top","Trousers","Jacket","Shoes","Bag","Accessory","Hair"];
  slots.forEach(slot => {
    const match = recs.find(r => r.slot === slot);
    if (match) {
      // Pick the variant that best matches the palette
      const palette = quizAnswers?.palette;
      const palColours = palette ? (STYLE_MAP.palette[palette] || []) : [];
      let variantIdx = 0;
      if (palColours.length > 0) {
        const vi = match.item.variants.findIndex(v =>
          palColours.some(c => v.label.toLowerCase().includes(c.toLowerCase()))
        );
        if (vi >= 0) variantIdx = vi;
      }
      outfit[slot] = { item: match.item, variantIdx };
    }
  });
  return outfit;
}

// ─── MANNEQUIN (DRESS-UP) ──────────────────────────────────────────────────────
function sh(h, a) {
  if (!h || h === "transparent") return h;
  const n = parseInt(h.replace("#",""), 16);
  return `rgb(${Math.max(0,((n>>16)&255)-a)},${Math.max(0,((n>>8)&255)-a)},${Math.max(0,(n&255)-a)})`;
}
function li(h, a) {
  if (!h || h === "transparent") return h;
  const n = parseInt(h.replace("#",""), 16);
  return `rgb(${Math.min(255,((n>>16)&255)+a)},${Math.min(255,((n>>8)&255)+a)},${Math.min(255,(n&255)+a)})`;
}

function AvatarBuilder({ av, onAvatarChange, onBack, onNavigateToCatalog, saved, isLoggedIn }) {

  const tabs = [

// 🔑 To go live: replace FASHN_API_KEY with your real key from app.fashn.ai
const FASHN_API_KEY = "DEMO_MODE";

const DEMO_RESULTS = [
  { label:"Linen Blazer Look",    color:"#E8D5B0", emoji:"👔" },
  { label:"Street Style Fit",     color:"#1A1009", emoji:"🧢" },
  { label:"Evening Elegance",     color:"#4A5A6B", emoji:"✨" },
  { label:"Casual Day Out",       color:"#C8A882", emoji:"☀"  },
];

function TryOnModal({ onClose, outfit, activeSlot }) {
  const [step, setStep]           = useState("upload"); // upload | processing | result
  const [userPhoto, setUserPhoto] = useState(null);
  const [userPhotoURL, setUserPhotoURL] = useState(null);
  const [selectedItem, setSelectedItem] = useState(null);
  const [resultIdx, setResultIdx] = useState(0);
  const [processing, setProcessing] = useState(false);
  const [progress, setProgress]   = useState(0);
  const [error, setError]         = useState("");

  const activeOutfitItem = outfit?.[activeSlot]?.item;

  // Items with real product images would be passed here
  const tryOnItems = Object.entries(outfit)
    .filter(([,v]) => v?.item?.price > 0)
    .map(([slot, v]) => ({ slot, item: v.item, variantIdx: v.variantIdx }));

  const handlePhotoUpload = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) { setError("Photo must be under 10MB"); return; }
    setError("");
    setUserPhoto(file);
    setUserPhotoURL(URL.createObjectURL(file));
  };

  const handleTryOn = async () => {
    if (!userPhoto) { setError("Please upload a photo of yourself first"); return; }
    if (!selectedItem) { setError("Please select a garment to try on"); return; }
    setError("");
    setProcessing(true);
    setStep("processing");
    setProgress(0);

    // Simulate progress bar
    const interval = setInterval(() => {
      setProgress(p => {
        if (p >= 90) { clearInterval(interval); return 90; }
        return p + Math.random() * 12;
      });
    }, 400);

    if (FASHN_API_KEY === "DEMO_MODE") {
      // Demo mode — simulate API delay
      await new Promise(r => setTimeout(r, 4000));
      clearInterval(interval);
      setProgress(100);
      setTimeout(() => { setStep("result"); setProcessing(false); }, 500);
    } else {
      // Real Fashn.ai API call
      try {
        const toBase64 = (file) => new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = () => res(r.result.split(",")[1]);
          r.onerror = rej;
          r.readAsDataURL(file);
        });
        const modelBase64 = await toBase64(userPhoto);
        const response = await fetch("https://api.fashn.ai/v1/run", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${FASHN_API_KEY}` },
          body: JSON.stringify({
            model_image: `data:image/jpeg;base64,${modelBase64}`,
            garment_image: selectedItem.item.imageUrl || "",
            category: selectedItem.slot === "Top" ? "tops" : selectedItem.slot === "Trousers" ? "bottoms" : "one-pieces",
          })
        });
        const data = await response.json();
        clearInterval(interval);
        setProgress(100);
        if (data.output?.[0]) {
          setUserPhotoURL(data.output[0]);
          setTimeout(() => { setStep("result"); setProcessing(false); }, 500);
        } else {
          throw new Error(data.error || "Try-on failed");
        }
      } catch(e) {
        clearInterval(interval);
        setError("Try-on failed: " + e.message);
        setStep("upload");
        setProcessing(false);
      }
    }
  };

  const demoResult = DEMO_RESULTS[resultIdx % DEMO_RESULTS.length];

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#FFFFFF",width:"100%",maxWidth:"480px",maxHeight:"90vh",display:"flex",flexDirection:"column",borderRadius:"12px",overflow:"hidden",boxShadow:"0 40px 100px rgba(0,0,0,0.5)",animation:"fadeIn 0.25s ease"}}>

        {/* Header */}
        <div style={{background:"linear-gradient(135deg,#0A0A0A 0%,#1A2A3A 100%)",padding:"18px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"18px",color:"#FFFFFF"}}>🤖 AI Try-On</div>
            <div style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",color:"#5BA4CF",letterSpacing:"0.12em",marginTop:"2px"}}>
              {FASHN_API_KEY === "DEMO_MODE" ? "DEMO MODE — POWERED BY FASHN.AI" : "POWERED BY FASHN.AI"}
            </div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"1px solid #333",color:"#444",width:"28px",height:"28px",cursor:"pointer",borderRadius:"4px",fontSize:"12px"}}>✕</button>
        </div>

        <div style={{flex:1,overflowY:"auto"}}>

          {/* STEP 1 — UPLOAD */}
          {step === "upload" && (
            <div style={{padding:"24px"}}>

              {/* Demo mode notice */}
              {FASHN_API_KEY === "DEMO_MODE" && (

                {tryOnItems.length === 0 ? (

                        <div key={item.id} onClick={()=>setSelectedItem({slot,item,variantIdx})} style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px 14px",border:`2px solid ${isSel?"#5BA4CF":"#EBEBEB"}`,borderRadius:"8px",cursor:"pointer",background:isSel?"#F0F7FF":"#FFFFFF",transition:"all 0.15s"}}>
                          <div style={{width:"28px",height:"28px",borderRadius:"50%",background:col,border:"1px solid rgba(0,0,0,0.1)",flexShrink:0}}/>
                          <div style={{flex:1}}>
                            <div style={{fontFamily:"'Inter',sans-serif",fontSize:"12px",fontWeight:600,color:"#0A0A0A"}}>{item.name}</div>
                            <div style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",color:"#444"}}>{slot} · {item.variants?.[variantIdx]?.label}</div>

              {error && <div style={{background:"#FFF0F0",border:"1px solid #FFAAAA",borderRadius:"6px",padding:"10px 14px",fontFamily:"'Inter',sans-serif",fontSize:"11px",color:"#CC3333",marginBottom:"12px"}}>{error}</div>}

              <button onClick={handleTryOn} disabled={!userPhoto||!selectedItem} style={{width:"100%",background:(!userPhoto||!selectedItem)?"#CCCCCC":"linear-gradient(135deg,#5BA4CF,#C4A882)",color:"#FFFFFF",border:"none",padding:"14px",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"12px",letterSpacing:"0.1em",cursor:(!userPhoto||!selectedItem)?"not-allowed":"pointer",borderRadius:"8px",transition:"all 0.2s"}}>
                ✨ GENERATE TRY-ON
              </button>
            </div>
          )}

          {/* STEP 2 — PROCESSING */}
          {step === "processing" && (
            <div style={{padding:"48px 24px",textAlign:"center"}}>
              <div style={{fontSize:"48px",marginBottom:"20px",animation:"float 1.5s ease-in-out infinite"}}>🤖</div>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"20px",marginBottom:"8px"}}>Generating your look...</div>
              <div style={{fontFamily:"'Inter',sans-serif",fontSize:"12px",color:"#444",marginBottom:"28px",lineHeight:1.7}}>

              <div style={{background:"#F0F0F0",borderRadius:"8px",height:"8px",overflow:"hidden",marginBottom:"12px"}}>

              </div>
              <div style={{fontFamily:"'Inter',sans-serif",fontSize:"10px",color:"#333"}}>{Math.round(Math.min(progress,100))}% complete</div>
              <div style={{marginTop:"24px",display:"flex",justifyContent:"center",gap:"6px"}}>
                {["Analysing body shape","Fitting garment","Adjusting lighting","Finalising"].map((s,i) => (
                  <div key={i} style={{fontFamily:"'Inter',sans-serif",fontSize:"8px",color:progress > i*25?"#5BA4CF":"#DDD",letterSpacing:"0.06em",transition:"color 0.5s"}}>{s}</div>
                ))}
              </div>
            </div>
          )}

          {/* STEP 3 — RESULT */}
          {step === "result" && (
            <div style={{padding:"24px"}}>
              <div style={{fontFamily:"'Inter',sans-serif",fontSize:"10px",fontWeight:700,letterSpacing:"0.12em",color:"#0A0A0A",marginBottom:"12px"}}>✨ YOUR TRY-ON RESULT</div>

              {FASHN_API_KEY === "DEMO_MODE" ? (
                /* Demo result */
                <div style={{borderRadius:"12px",overflow:"hidden",marginBottom:"16px",position:"relative",border:"1px solid #EBEBEB"}}>
                  <div style={{background:`linear-gradient(160deg,${demoResult.color}22,${demoResult.color}44)`,height:"320px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"12px"}}>
                    <div style={{fontSize:"80px"}}>{demoResult.emoji}</div>
                    <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"16px",color:"#0A0A0A"}}>{demoResult.label}</div>
                    <div style={{background:"rgba(255,255,255,0.9)",border:"1px solid #DDD",borderRadius:"20px",padding:"6px 16px",fontFamily:"'Inter',sans-serif",fontSize:"10px",color:"#333"}}>
                      {selectedItem?.item?.name} · {selectedItem?.item?.variants?.[selectedItem?.variantIdx]?.label}
                    </div>
                  </div>
                  <div style={{position:"absolute",top:"10px",right:"10px",background:"rgba(0,0,0,0.6)",color:"#FFFFFF",fontFamily:"'Inter',sans-serif",fontSize:"8px",padding:"4px 10px",borderRadius:"4px",letterSpacing:"0.1em"}}>DEMO PREVIEW</div>
                </div>
              ) : (
                /* Real result */
                <div style={{borderRadius:"12px",overflow:"hidden",marginBottom:"16px",border:"1px solid #EBEBEB"}}>
                  <img src={userPhotoURL} alt="Try-on result" style={{width:"100%",display:"block"}}/>
                </div>
              )}

              <div style={{background:"#F9F9F9",border:"1px solid #EBEBEB",borderRadius:"8px",padding:"12px 16px",marginBottom:"16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontFamily:"'Inter',sans-serif",fontSize:"11px",fontWeight:600,color:"#0A0A0A"}}>{selectedItem?.item?.name}</div>
                  <div style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",color:"#444",marginTop:"2px"}}>{selectedItem?.slot} · {selectedItem?.item?.variants?.[selectedItem?.variantIdx]?.label}</div>
                </div>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"16px",color:"#6B7B8D"}}>${selectedItem?.item?.price}</div>
              </div>

              <div style={{display:"flex",gap:"10px",marginBottom:"12px"}}>
                <button onClick={()=>{setStep("upload");setResultIdx(r=>r+1);}} style={{flex:1,background:"#F5F5F5",color:"#0A0A0A",border:"1px solid #DDD",padding:"12px",fontFamily:"'Inter',sans-serif",fontSize:"10px",fontWeight:700,cursor:"pointer",borderRadius:"8px",letterSpacing:"0.08em"}}>↩ TRY ANOTHER</button>
                <button onClick={onClose} style={{flex:1,background:"#0A0A0A",color:"#FFFFFF",border:"none",padding:"12px",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"10px",cursor:"pointer",borderRadius:"8px",letterSpacing:"0.1em"}}>ADD TO CART ✦</button>
              </div>

              {FASHN_API_KEY === "DEMO_MODE" && (
                <div style={{textAlign:"center",fontFamily:"'Inter',sans-serif",fontSize:"9px",color:"#333",lineHeight:1.6}}>
                  Real try-on powered by Fashn.ai. Add your API key to generate accurate results.
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function DressUp({ onNavigateToAvatar, av, styleProfile, user }) {
  const avatarData = av || DEFAULT_AVATAR;

  // Build recommended outfit from style profile
  const recommendedOutfit = styleProfile ? buildRecommendedOutfit(styleProfile) : null;
  const recommendations   = styleProfile ? getRecommendations(styleProfile) : [];

  const [outfit, setOutfit] = useState(() => recommendedOutfit || DEFAULT_OUTFIT);
  const [showRecs, setShowRecs] = useState(!!styleProfile);
  const [activeSlot, setActiveSlot]       = useState("Top");
  const [showCheckout, setShowCheckout]   = useState(false);
  const [checkoutStep, setCheckoutStep]   = useState("bag");    // bag | details | processing | confirmed | delivery
  const [orderDetails, setOrderDetails]   = useState({ name:"", phone:"", address:"", city:"", state:"Lagos", note:"" });
  const [paymentMethod, setPaymentMethod] = useState("");
  const [orderId, setOrderId]             = useState("");
  const [deliveryTab, setDeliveryTab]     = useState("status");
  const [selectedSizes, setSelectedSizes] = useState({Top:"M",Jacket:"M",Trousers:"M",Shoes:"7",Hair:null,Bag:null,Accessory:null});
  const [favourites, setFavourites]       = useState([]);
  const [showFavs, setShowFavs]           = useState(false);
  const [shareToast, setShareToast]       = useState(false);
  const [showMannequin, setShowMannequin] = useState(false);
  const [showTryOn, setShowTryOn]         = useState(false);
  const [isMobile, setIsMobile]           = useState(window.innerWidth < 768);
  const [liveProducts, setLiveProducts]   = useState([]);
  const [catalogLoading, setCatalogLoading] = useState(true);

  useEffect(() => {
    const fn = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);

  // Fetch live products from Firestore and merge with hardcoded catalog
  useEffect(() => {
    fb.db.getPublicCatalog()
      .then(products => {
        setLiveProducts(products);
      })
      .catch(e => console.error("Catalog fetch error:", e))
      .finally(() => setCatalogLoading(false));
  }, []);

  // Merge Firestore products into CATALOG structure
  const LIVE_CATALOG = React.useMemo(() => {
    if (liveProducts.length === 0) return CATALOG;
    const merged = { ...CATALOG };
    // Group live products by category
    liveProducts.forEach(p => {
      const slot = p.category; // e.g. "Top", "Trousers", etc.
      if (!merged[slot]) return; // skip unknown categories
      // Convert Firestore product to catalog item format
      const catalogItem = {
        id:       p.id,
        name:     p.name,
        price:    Math.round((p.price || 0) / 1600), // convert ₦ to $ for display
        priceNgn: p.price || 0,
        brand:    p.brandId || "Partner Brand",
        isLive:   true, // flag to show "BRAND" badge
        affLink:  p.affLink || "",
        variants: p.variants || [{ label: "Default", hex: "#C8A882" }],
      };
      // Add to front of slot if not already present
      const exists = merged[slot].some(i => i.id === p.id);
      if (!exists) {
        merged[slot] = [catalogItem, ...merged[slot]];
      }
    });
    return merged;
  }, [liveProducts]);

  const pickItem    = item => setOutfit(o => ({...o, [activeSlot]: {item, variantIdx:0}}));
  const pickVariant = (item, vi) => setOutfit(o => ({...o, [activeSlot]: {item, variantIdx:vi}}));

  const saveFavourite = async () => {
    const outfitData = {
      outfit: Object.fromEntries(
        Object.entries(outfit).map(([slot, val]) => [slot, {
          itemId: val?.item?.id,
          itemName: val?.item?.name,
          itemPrice: val?.item?.price,
          variantIdx: val?.variantIdx,
          variantLabel: val?.item?.variants?.[val?.variantIdx]?.label,
          variantHex: val?.item?.variants?.[val?.variantIdx]?.hex,
        }])
      ),
      total: totalPrice,
      items: Object.entries(outfit).filter(([,v])=>v?.item?.price>0).length,
    };
    // Always add to local state immediately
    const localEntry = { outfit:{...outfit}, sizes:{...selectedSizes}, savedAt:Date.now(), total:totalPrice };
    setFavourites(f => [...f, localEntry]);
    setShareToast("❤ Saved to your profile!");
    setTimeout(() => setShareToast(false), 2200);
    // Persist to Firestore if logged in
    if (user?.uid) {
      try {
        const docId = await fb.db.saveOutfit(user.uid, outfitData);
        // Update local entry with Firestore id
        if (docId) setFavourites(f => f.map((e,i) => i===f.length-1 ? {...e, firestoreId:docId} : e));
      } catch(e) { console.error("Save outfit error:", e); }
    } else {
      // Guest — save to localStorage
      try {
        const existing = JSON.parse(localStorage.getItem("tofy_saved_outfits") || "[]");
        existing.unshift(outfitData);
        localStorage.setItem("tofy_saved_outfits", JSON.stringify(existing.slice(0,20)));
      } catch {}
    }
  };
  const [shareModal, setShareModal] = useState(false);

  const shareOutfit = () => setShareModal(true);

  const getSuggestions = () => {
    if (!["Top","Jacket"].includes(activeSlot)) return [];
    const topColor = getColor("Top", outfit);
    if (!topColor || topColor === "transparent") return [];
    const hex = topColor.replace("#","");
    const r = parseInt(hex.substr(0,2),16), g = parseInt(hex.substr(2,2),16), b = parseInt(hex.substr(4,2),16);
    const isDark = (r*299+g*587+b*114)/1000 < 128;
    const trouserSuggestions = isDark
      ? CATALOG.Trousers.filter(i => i.variants.some(v => v.label==="Beige"||v.label==="Grey"||v.label==="White"))
      : CATALOG.Trousers.filter(i => i.variants.some(v => v.label==="Black"||v.label==="Navy"));
    const shoeSuggestions = CATALOG.Shoes.filter(i => i.variants.some(v => v.label==="Black"||v.label==="Brown"||v.label==="White"));
    return [...trouserSuggestions.slice(0,2).map(i=>({...i,suggestSlot:"Trousers"})), ...shoeSuggestions.slice(0,2).map(i=>({...i,suggestSlot:"Shoes"}))].slice(0,4);
  };

  const totalPrice = Object.values(outfit).reduce((s,v) => s+(v?.item?.price||0), 0);
  const totalItems = Object.values(outfit).filter(v => v?.item?.price>0).length;
  // Sort items: recommended ones float to top
  const slotRecs   = recommendations.filter(r => r.slot === activeSlot).map(r => r.item.id);
  const rawItems   = LIVE_CATALOG[activeSlot] || [];
  const items      = showRecs && slotRecs.length > 0
    ? [...rawItems.filter(i => slotRecs.includes(i.id)), ...rawItems.filter(i => !slotRecs.includes(i.id))]
    : rawItems;
  const curSel     = outfit[activeSlot];
  const sideVars   = curSel?.item?.variants || [];
  const curVI      = curSel?.variantIdx ?? 0;
  const sc         = SLOT_COLORS[activeSlot];
  const suggestions = getSuggestions();

  // ── SHARED ITEM CARD ──
  const ItemCard = ({item}) => {
    const isSel      = outfit[activeSlot]?.item?.id === item.id;
    const isNone     = item.price === 0;
    const selVI      = isSel ? (outfit[activeSlot]?.variantIdx??0) : 0;
    const dispColor  = item.variants[selVI]?.hex || "transparent";
    const colorCount = item.variants.filter(v=>v.hex!=="transparent").length;
    const imgH       = isMobile ? 96 : 130;
    const svgSz      = isMobile ? 52 : 72;
    return (
      <div className="item-card" onClick={() => pickItem(item)} style={{
        background:isSel?"#0A0A0A":"#FFFFFF", border:`${isSel?2:1}px solid ${isSel?"#0A0A0A":"#E8E8E8"}`,
        cursor:"pointer", transition:"all 0.2s", overflow:"hidden", borderRadius:"8px",
      }}>
        <div style={{position:"relative",height:imgH,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",
          background:isNone?"#F5F5F5":dispColor==="transparent"?"#F5F5F5":`linear-gradient(145deg,${dispColor}22,${dispColor}88)`,
        }}>
          {!isNone && dispColor!=="transparent" && (
            <svg viewBox="0 0 80 90" width={svgSz} height={svgSz*1.1} style={{filter:"drop-shadow(0 4px 8px rgba(0,0,0,0.15))"}}>
              {activeSlot==="Top"||activeSlot==="Jacket" ? <path d="M20,10 Q40,4 60,10 L68,30 L56,28 L56,80 L24,80 L24,28 L12,30 Z" fill={dispColor}/>
              : activeSlot==="Trousers" ? <><path d="M16,4 Q40,0 64,4 L66,44 L48,46 L40,56 L32,46 L14,44 Z" fill={dispColor}/><path d="M14,44 L10,86 L36,86 L40,62 Z" fill={dispColor}/><path d="M66,44 L70,86 L44,86 L40,62 Z" fill={dispColor}/></>
              : activeSlot==="Shoes" ? <path d="M10,50 Q14,54 44,56 Q56,58 54,66 Q38,72 8,64 Q0,58 4,52 Z" fill={dispColor}/>
              : activeSlot==="Bag" ? <><rect x="10" y="24" width="60" height="52" rx="6" fill={dispColor}/><path d="M24,24 C24,12 56,12 56,24" fill="none" stroke={dispColor} strokeWidth="4" strokeLinecap="round"/></>
              : activeSlot==="Hair" ? <ellipse cx="40" cy="38" rx="30" ry="34" fill={dispColor}/>
              : <circle cx="40" cy="40" r="28" fill={dispColor}/>}
            </svg>
          )}
          {isNone && <span style={{fontSize:"24px",opacity:0.4}}>{SLOT_ICONS[activeSlot]}</span>}
          {!isNone && <div style={{position:"absolute",top:"6px",left:"6px",background:isSel?"rgba(255,255,255,0.2)":"rgba(0,0,0,0.06)",color:isSel?"#FFF":"#555",fontFamily:"'Inter',sans-serif",fontSize:"7px",padding:"2px 5px",borderRadius:"3px"}}>{colorCount}c</div>}
          {isSel && <div style={{position:"absolute",top:"6px",right:"6px",width:"18px",height:"18px",borderRadius:"50%",background:"#6B7B8D",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"9px",fontWeight:700,color:"#FFFFFF"}}>✓</div>}
        </div>
        <div style={{padding:isMobile?"7px 8px":"10px 12px 12px"}}>
          <div style={{display:"flex",gap:"4px",flexWrap:"wrap",marginBottom:"4px"}}>
            {showRecs && slotRecs.includes(item.id) && (
              <div style={{display:"inline-block",background:"#5BA4CF",color:"#FFFFFF",fontFamily:"'Inter',sans-serif",fontSize:"7px",fontWeight:700,letterSpacing:"0.1em",padding:"2px 6px",borderRadius:"3px"}}>★ FOR YOU</div>
            )}
            {item.isLive && (
              <div style={{display:"inline-block",background:"#C4A882",color:"#FFFFFF",fontFamily:"'Inter',sans-serif",fontSize:"7px",fontWeight:700,letterSpacing:"0.1em",padding:"2px 6px",borderRadius:"3px"}}>✦ BRAND</div>
            )}
          </div>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:isMobile?"11px":"13px",color:isSel?"#FFFFFF":"#111",marginBottom:"4px",lineHeight:1.2}}>{item.name}</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:isMobile?"4px":"8px"}}>
            <span style={{fontFamily:"'Inter',sans-serif",fontSize:isMobile?"11px":"13px",fontWeight:700,color:isSel?"#6B7B8D":"#0A0A0A"}}>{isNone?"FREE":`$${item.price}`}</span>
            <span style={{fontFamily:"'Inter',sans-serif",fontSize:"7px",color:isSel?"#AAA":"#999"}}>{isSel?"ON ✦":"WEAR"}</span>
          </div>
          {!isMobile && (
            <div style={{display:"flex",gap:"4px",flexWrap:"wrap"}}>
              {item.variants.filter(v=>v.hex!=="transparent").map((v,vi)=>(
                <div key={vi} style={{width:"10px",height:"10px",borderRadius:"50%",background:v.hex,border:"1px solid rgba(0,0,0,0.1)",flexShrink:0}}/>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  };

  // ── SLOT TABS ──
  const SlotTabs = () => (
    <div style={{display:"flex",borderBottom:"1px solid #EBEBEB",background:"#FFFFFF",flexShrink:0,overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
      {SLOTS.map(slot => {
        const has = outfit[slot]?.item?.price>0;
        const isA = activeSlot===slot;
        const slc = SLOT_COLORS[slot];
        return (
          <button key={slot} className="slot-tab" onClick={()=>setActiveSlot(slot)} style={{
            flex:1, minWidth:isMobile?"52px":"72px", border:"none",
            background:isA?slc.bg:"transparent", color:isA?slc.text:"#888",
            borderBottom:`3px solid ${isA?slc.accent:"transparent"}`,
            padding:isMobile?"8px 4px 6px":"12px 6px 8px", cursor:"pointer", transition:"all 0.18s",
            fontFamily:"'Inter',sans-serif", fontSize:isMobile?"7px":"8px", letterSpacing:"0.08em",
            display:"flex", flexDirection:"column", alignItems:"center", gap:"2px",
          }}>
            <span style={{fontSize:isMobile?"13px":"15px"}}>{SLOT_ICONS[slot]}</span>
            <span style={{fontWeight:isA?700:400}}>{slot.toUpperCase()}</span>
            {has && <div style={{width:"4px",height:"4px",borderRadius:"50%",background:isA?slc.text:slc.accent}}/>}
          </button>
        );
      })}
    </div>
  );

  // ── SECTION HEADER ──
  const SectionHeader = () => (

        const downloadCard = async () => {
          const svgEl = document.getElementById("tofy-share-svg");
          if (!svgEl) return;
          setShareToast("⏳ Generating image...");

          const items = Object.entries(outfit).filter(([,v])=>v?.item?.price>0);
          const CW = 460, CH = 680;
          const canvas = document.createElement("canvas");
          canvas.width = CW * 2; canvas.height = CH * 2;
          const ctx = canvas.getContext("2d");
          ctx.scale(2, 2);

          // Helper — rounded rect (replaces ctx.roundRect for broad browser support)
          function rr(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
          }

          // Background gradient
          const bg = ctx.createLinearGradient(0, 0, CW, CH);
          bg.addColorStop(0, "#F5F9FF"); bg.addColorStop(1, "#EBF0FF");
          ctx.fillStyle = bg; ctx.fillRect(0, 0, CW, CH);

          // Header bar
          ctx.fillStyle = "#0A0A0A";
          rr(20, 20, CW-40, 50, 10); ctx.fill();
          ctx.fillStyle = "#FFFFFF";
          ctx.font = "bold 22px Arial, sans-serif";
          ctx.fillText("TOFY  ✦", 36, 52);
          ctx.font = "11px Arial, sans-serif";
          ctx.fillStyle = "#5BA4CF";
          ctx.fillText("tofy.style", CW - 100, 52);

          // Mannequin SVG → image
          const serializer = new XMLSerializer();
          const svgStr = serializer.serializeToString(svgEl);
          const svgBlob = new Blob([svgStr], {type:"image/svg+xml;charset=utf-8"});
          const svgUrl = URL.createObjectURL(svgBlob);

          await new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
              ctx.fillStyle = "rgba(255,255,255,0.85)";
              rr(20, 84, 200, 320, 10); ctx.fill();
              ctx.drawImage(img, 28, 88, 184, 308);
              URL.revokeObjectURL(svgUrl);
              resolve();
            };
            img.onerror = () => { URL.revokeObjectURL(svgUrl); resolve(); };
            img.src = svgUrl;
          });

          // Outfit card
          ctx.fillStyle = "#FFFFFF";
          rr(234, 84, CW-254, 320, 10); ctx.fill();

          ctx.fillStyle = "#111";
          ctx.font = "bold 15px Arial, sans-serif";
          ctx.fillText("My Tofy Look", 248, 112);

          let y = 138;
          items.forEach(([slot, s]) => {
            ctx.fillStyle = "#555";
            ctx.font = "11px Arial, sans-serif";
            ctx.fillText((SLOT_ICONS[slot]+" "+s.item.name).slice(0,22), 248, y);
            ctx.fillStyle = "#0A0A0A";
            ctx.font = "bold 11px Arial, sans-serif";
            ctx.fillText("$"+s.item.price, CW-65, y);
            y += 26;
          });

          // Divider + total
          ctx.strokeStyle = "#EBEBEB"; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(248, y+6); ctx.lineTo(CW-34, y+6); ctx.stroke();
          y += 22;
          ctx.fillStyle = "#999"; ctx.font = "10px Arial, sans-serif";
          ctx.fillText("TOTAL", 248, y);
          ctx.fillStyle = "#0A0A0A"; ctx.font = "bold 20px Arial, sans-serif";
          ctx.fillText("$"+totalPrice, 248, y+26);

          // Footer
          ctx.fillStyle = "#5BA4CF";
          rr(20, CH-64, CW-40, 36, 8); ctx.fill();
          ctx.fillStyle = "#FFFFFF";
          ctx.font = "bold 13px Arial, sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("Style yours at tofy.style ✦", CW/2, CH-40);
          ctx.textAlign = "left";

          const link = document.createElement("a");
          link.download = "my-tofy-look.png";
          link.href = canvas.toDataURL("image/png");
          link.click();
          setShareToast("✅ Image saved!");
          setTimeout(() => setShareToast(false), 2500);
        };

        const shareText = (() => {
          const lines = Object.entries(outfit).filter(([,v])=>v?.item?.price>0).map(([slot,s])=>SLOT_ICONS[slot]+" "+s.item.name+" \u2014 $"+s.item.price);
          return "My Tofy Look \u2726\n" + lines.join("\n") + "\nTotal: $"+totalPrice+"\n\nstyled on tofy.style";

        return (

                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"13px",color:"#0A0A0A",marginBottom:"10px"}}>My Tofy Look</div>
                  {Object.entries(outfit).filter(([,v])=>v?.item?.price>0).map(([slot,s])=>(

                      <div style={{fontFamily:"'Inter',sans-serif",fontSize:"10px",color:"#555",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"130px"}}>{SLOT_ICONS[slot]} {s.item.name}</div>
                      <div style={{fontFamily:"'Inter',sans-serif",fontSize:"10px",fontWeight:700,color:"#0A0A0A"}}>${s.item.price}</div>
                    </div>
                  ))}
                  <div style={{borderTop:"1px solid #F0F0F0",marginTop:"8px",paddingTop:"8px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",letterSpacing:"0.1em",color:"#333"}}>TOTAL</div>
                    <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"18px",color:"#0A0A0A"}}>${totalPrice}</div>
                  </div>
                </div>
              </div>
              <div style={{textAlign:"center",fontFamily:"'Inter',sans-serif",fontSize:"9px",color:"#333",letterSpacing:"0.1em",padding:"6px 0 0"}}>styled on tofy.style</div>

              {/* Action buttons */}
              <div style={{padding:"16px 20px 20px",display:"flex",flexDirection:"column",gap:"8px"}}>
                {/* Download image */}
                <button onClick={()=>{
                  const svgEl = document.querySelector("#tofy-share-svg-wrapper svg");

            </div>
          </div>

      {/* ── SAVED LOOKS MODAL ── */}
      {showTryOn && <TryOnModal onClose={()=>setShowTryOn(false)} outfit={outfit} activeSlot={activeSlot}/>}

      {showFavs && (

          </div>
        </div>
      )}
    </div>

}

function ExplorePage({ onBack, onNavigate }) {
  const [tab, setTab]             = useState("feed");

  const [ratingDone, setRatingDone] = useState(false);

  // Filters
  const [sort, setSort]           = useState("popular");
  const [maxBudget, setMaxBudget] = useState(700);
  const [tagFilter, setTagFilter] = useState("ALL");

  const allTags = ["ALL", "minimal", "street", "earthy", "bold", "luxury", "casual", "dark"];

  const sorted = [...COMMUNITY_LOOKS]
    .filter(l => l.total <= maxBudget)
    .filter(l => tagFilter === "ALL" || l.tags.includes(tagFilter))
    .sort((a, b) => {
      if (sort === "popular")    return b.likes - a.likes;
      if (sort === "newest")     return a.id - b.id;  // lower id = older, flip for "newest"
      if (sort === "oldest")     return a.id - b.id;
      if (sort === "price_asc")  return a.total - b.total;
      if (sort === "price_desc") return b.total - a.total;
      if (sort === "az")         return a.user.localeCompare(b.user);
      if (sort === "za")         return b.user.localeCompare(a.user);
      return 0;
    });

  const SORT_OPTIONS = [
    {id:"popular",    label:"Most Popular"},
    {id:"newest",     label:"Newest First"},
    {id:"oldest",     label:"Oldest First"},
    {id:"price_asc",  label:"Price: Low → High"},
    {id:"price_desc", label:"Price: High → Low"},
    {id:"az",         label:"A → Z"},

// ─── AUTH SCREEN ──────────────────────────────────────────────────────────────
function AuthScreen({ onSuccess }) {
  const [mode, setMode]         = useState("login"); // "login" | "signup"
  const [email, setEmail]       = useState("");
  const [password, setPassword] = useState("");
  const [name, setName]         = useState("");
  const [error, setError]       = useState("");
  const [info, setInfo]         = useState("");
  const [loading, setLoading]   = useState(false);
  const { signIn, signUp }      = useAuth();

  const isDemoMode = !isFirebaseConfigured;

  const handleSubmit = async () => {
    setError(""); setInfo("");
    if (!email || !password) { setError("Please fill in all fields."); return; }
    if (mode === "signup" && !name) { setError("Please enter your name."); return; }

    // Demo mode — skip real auth
    if (isDemoMode) {
      onSuccess({ id:"demo", email, user_metadata:{ full_name: name || email.split("@")[0] } }, null);
      return;
    }

    setLoading(true);
    const result = mode === "login"
      ? await signIn(email, password)
      : await signUp(email, password, name);
    setLoading(false);

    if (result.success) {
      if (result.needsConfirm) {
        setInfo("✅ Account created! Check your email to confirm, then log in.");
        setMode("login");
      } else {
        onSuccess();
      }
    } else {
      setError(result.error);
    }
  };

  const inp = (val, set, placeholder, type="text") => (
    <input
      type={type} value={val} onChange={e => set(e.target.value)} placeholder={placeholder}
      onKeyDown={e => e.key==="Enter" && handleSubmit()}
      style={{width:"100%",padding:"12px 14px",border:"1px solid #E0E0E0",fontFamily:"'Inter',sans-serif",fontSize:"12px",color:"#0A0A0A",background:"#FAFAFA",outline:"none",borderRadius:"4px",boxSizing:"border-box",marginBottom:"10px"}}
    />
  );

  return (
    <div style={{minHeight:"100%",background:"#F5F9FF",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,backgroundImage:"radial-gradient(rgba(200,244,0,0.07) 1px,transparent 1px)",backgroundSize:"24px 24px",pointerEvents:"none"}}/>
      <div style={{background:"#FFFFFF",width:"100%",maxWidth:"400px",borderRadius:"8px",overflow:"hidden",boxShadow:"0 40px 100px rgba(0,0,0,0.5)",position:"relative",zIndex:1}}>
        {/* Header */}
        <div style={{background:"#5BA4CF",padding:"28px 32px 24px",borderBottom:"1px solid #93C5E8"}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"28px",color:"#6B7B8D",letterSpacing:"0.12em",marginBottom:"4px"}}>TOFY</div>
          <div style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",color:"#E8F4FF",letterSpacing:"0.2em"}}>{mode==="login"?"WELCOME BACK":"CREATE YOUR ACCOUNT"}</div>
        </div>

        {/* Demo mode banner */}
        {isDemoMode && (
          <div style={{background:"#FFF9E6",borderBottom:"1px solid #FFE066",padding:"10px 24px",display:"flex",gap:"8px",alignItems:"center"}}>
            <span style={{fontSize:"14px"}}>⚠️</span>
            <span style={{fontFamily:"'Inter',sans-serif",fontSize:"8px",color:"#8A6000",letterSpacing:"0.1em",lineHeight:1.6}}>DEMO MODE — Firebase not connected yet. Any email/password will work.</span>
          </div>
        )}

        {/* Form */}
        <div style={{padding:"28px 32px"}}>
          {info && <div style={{background:"#F0FFF0",border:"1px solid #AAEEAA",padding:"10px 14px",borderRadius:"4px",fontFamily:"'Inter',sans-serif",fontSize:"10px",color:"#2A6A2A",marginBottom:"14px",lineHeight:1.6}}>{info}</div>}
          {error && <div style={{background:"#FFF0F0",border:"1px solid #FFAAAA",padding:"10px 14px",borderRadius:"4px",fontFamily:"'Inter',sans-serif",fontSize:"10px",color:"#AA2222",marginBottom:"14px"}}>{error}</div>}

          {mode==="signup" && inp(name, setName, "Full name")}
          {inp(email, setEmail, "Email address", "email")}
          {inp(password, setPassword, "Password", "password")}

          <button onClick={handleSubmit} disabled={loading} style={{width:"100%",background:"#6B7B8D",color:"#FFFFFF",border:"none",padding:"14px",fontFamily:"'Inter',sans-serif",fontSize:"10px",letterSpacing:"0.2em",cursor:loading?"not-allowed":"pointer",fontWeight:700,borderRadius:"4px",opacity:loading?0.7:1,marginBottom:"16px",transition:"all 0.2s"}}>
            {loading ? "PLEASE WAIT..." : mode==="login" ? "LOG IN ✦" : "CREATE ACCOUNT ✦"}
          </button>

          {/* Divider */}
          <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"16px"}}>
            <div style={{flex:1,height:"1px",background:"#EBEBEB"}}/>
            <span style={{fontFamily:"'Inter',sans-serif",fontSize:"8px",color:"#444",letterSpacing:"0.1em"}}>{mode==="login"?"NEW TO TOFY?":"ALREADY HAVE AN ACCOUNT?"}</span>
            <div style={{flex:1,height:"1px",background:"#EBEBEB"}}/>
          </div>

          <button onClick={() => { setMode(m => m==="login"?"signup":"login"); setError(""); setInfo(""); }} style={{width:"100%",background:"transparent",color:"#0A0A0A",border:"1px solid #E0E0E0",padding:"12px",fontFamily:"'Inter',sans-serif",fontSize:"10px",letterSpacing:"0.12em",cursor:"pointer",borderRadius:"4px",transition:"all 0.2s"}}>
            {mode==="login" ? "SIGN UP FREE →" : "← BACK TO LOG IN"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── PROFILE PAGE ─────────────────────────────────────────────────────────────
function ProfilePage({ user, profile, onBack, onSignOut, onSave, onNavigateToCatalog }) {
  const [editing, setEditing]     = useState(false);
  const [name, setName]           = useState(profile?.full_name || user?.user_metadata?.full_name || "");
  const [saved, setSaved]         = useState(false);
  const [savedOutfits, setSavedOutfits] = useState([]);
  const [loadingOutfits, setLoadingOutfits] = useState(true);
  const [activeProfileTab, setActiveProfileTab] = useState("details");

  const [orders, setOrders] = useState([]);

  useEffect(() => {
    if (!user?.uid) { setLoadingOutfits(false); return; }
    // Load saved outfits
    fb.db.getSavedOutfits(user.uid)
      .then(outfits => setSavedOutfits(outfits))
      .catch(() => {
        try {
          const local = JSON.parse(localStorage.getItem("tofy_saved_outfits") || "[]");
          setSavedOutfits(local);
        } catch {}
      })
      .finally(() => setLoadingOutfits(false));
    // Load orders
    fb.db.getOrders(user.uid)
      .then(o => setOrders(o))
      .catch(() => {
        try {
          const local = JSON.parse(localStorage.getItem("tofy_orders") || "[]");
          setOrders(local);
        } catch {}
      });
  }, [user?.uid]);

  const deleteOutfit = async (outfitId, index) => {
    setSavedOutfits(o => o.filter((_,i) => i !== index));
    if (outfitId) {
      try { await fb.db.deleteSavedOutfit(outfitId); } catch(e) { console.error(e); }
    }
  };

  const handleSave = async () => {
    await onSave({ full_name: name });
    setSaved(true); setEditing(false);
    setTimeout(() => setSaved(false), 2000);
  };

  const initials = (name || user?.email || "?").split(" ").map(w => w[0]).join("").toUpperCase().slice(0,2);
  const email    = user?.email || "";
  const joinedAt = user?.created_at ? new Date(user.created_at).toLocaleDateString("en-GB", { year:"numeric", month:"long" }) : "—";

  return (
    <div style={{minHeight:"100%",background:"#FFFFFF",fontFamily:"'Inter',sans-serif"}}>
      {/* Header */}
      <div style={{background:"#5BA4CF",padding:"28px 40px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",inset:0,backgroundImage:"radial-gradient(rgba(200,244,0,0.07) 1px,transparent 1px)",backgroundSize:"22px 22px",pointerEvents:"none"}}/>
        <button onClick={onBack} style={{position:"relative",zIndex:1,background:"transparent",border:"1px solid #333",color:"#444",fontFamily:"'Inter',sans-serif",fontSize:"9px",letterSpacing:"0.12em",padding:"6px 14px",cursor:"pointer",marginBottom:"20px",borderRadius:"3px"}}>← BACK</button>
        <div style={{display:"flex",alignItems:"center",gap:"20px",position:"relative",zIndex:1}}>
          <div style={{width:"64px",height:"64px",borderRadius:"50%",background:"#6B7B8D",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"22px",color:"#FFFFFF",flexShrink:0}}>{initials}</div>
          <div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"22px",color:"#FFFFFF",marginBottom:"4px"}}>{name || "Tofy User"}</div>
            <div style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",color:"#333",letterSpacing:"0.12em"}}>{email}</div>
            <div style={{fontFamily:"'Inter',sans-serif",fontSize:"8px",color:"#444",letterSpacing:"0.1em",marginTop:"4px"}}>MEMBER SINCE {joinedAt.toUpperCase()}</div>
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{padding:"32px 40px",maxWidth:"560px"}}>
        {saved && <div style={{background:"#F0FFF0",border:"1px solid #AAEEAA",padding:"10px 16px",borderRadius:"4px",fontFamily:"'Inter',sans-serif",fontSize:"10px",color:"#2A6A2A",marginBottom:"20px"}}>✅ Profile saved!</div>}

        {/* Profile details */}
        <div style={{marginBottom:"32px"}}>
          <div style={{fontFamily:"'Inter',sans-serif",fontSize:"8px",letterSpacing:"0.2em",color:"#444",marginBottom:"16px",fontWeight:700}}>PROFILE DETAILS</div>
          <div style={{border:"1px solid #EBEBEB",borderRadius:"8px",overflow:"hidden"}}>
            <div style={{padding:"16px 20px",borderBottom:"1px solid #F0F0F0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontFamily:"'Inter',sans-serif",fontSize:"8px",color:"#333",marginBottom:"4px",letterSpacing:"0.1em"}}>DISPLAY NAME</div>
                {editing
                  ? <input value={name} onChange={e=>setName(e.target.value)} style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"15px",border:"1px solid #6B7B8D",padding:"4px 8px",borderRadius:"4px",outline:"none",width:"200px"}}/>
                  : <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"15px"}}>{name || "—"}</div>
                }
              </div>
              {!editing
                ? <button onClick={()=>setEditing(true)} style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",background:"transparent",border:"1px solid #E0E0E0",padding:"5px 12px",cursor:"pointer",color:"#333",borderRadius:"3px"}}>EDIT</button>
                : <div style={{display:"flex",gap:"6px"}}>
                    <button onClick={handleSave} style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",background:"#6B7B8D",border:"none",padding:"5px 12px",cursor:"pointer",color:"#FFFFFF",fontWeight:700,borderRadius:"3px"}}>SAVE</button>
                    <button onClick={()=>{setEditing(false);setName(profile?.full_name||"");}} style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",background:"transparent",border:"1px solid #E0E0E0",padding:"5px 12px",cursor:"pointer",color:"#555",borderRadius:"3px"}}>CANCEL</button>
                  </div>
              }
            </div>
            <div style={{padding:"16px 20px",background:"#FAFAFA"}}>
              <div style={{fontFamily:"'Inter',sans-serif",fontSize:"8px",color:"#333",marginBottom:"4px",letterSpacing:"0.1em"}}>EMAIL</div>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"15px",color:"#555"}}>{email}</div>
            </div>
          </div>
        </div>

        {/* Stats */}
        <div style={{marginBottom:"32px"}}>
          <div style={{fontFamily:"'Inter',sans-serif",fontSize:"8px",letterSpacing:"0.2em",color:"#444",marginBottom:"16px",fontWeight:700}}>YOUR ACTIVITY</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"12px"}}>
            {[[savedOutfits.length.toString(),"Saved Looks"],["0","Liked Fits"],[orders.length.toString(),"Purchases"]].map(([n,l])=>(
              <div key={l} onClick={l==="Saved Looks"?()=>setActiveProfileTab("looks"):undefined} style={{border:"1px solid #EBEBEB",borderRadius:"8px",padding:"16px",textAlign:"center",cursor:l==="Saved Looks"?"pointer":"default",transition:"border 0.2s",borderColor:l==="Saved Looks"&&activeProfileTab==="looks"?"#6B7B8D":"#EBEBEB"}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"28px",color:"#6B7B8D",marginBottom:"4px"}}>{n}</div>
                <div style={{fontFamily:"'Inter',sans-serif",fontSize:"8px",color:"#444",letterSpacing:"0.1em"}}>{l.toUpperCase()}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Saved Looks Section */}
        {activeProfileTab === "looks" && (
          <div style={{marginBottom:"32px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
              <div style={{fontFamily:"'Inter',sans-serif",fontSize:"8px",letterSpacing:"0.2em",color:"#444",fontWeight:700}}>SAVED LOOKS ({savedOutfits.length})</div>
              <button onClick={()=>setActiveProfileTab("details")} style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",background:"none",border:"none",color:"#333",cursor:"pointer"}}>✕ close</button>
            </div>
            {loadingOutfits ? (
              <div style={{textAlign:"center",padding:"20px",fontFamily:"'Inter',sans-serif",fontSize:"11px",color:"#333"}}>Loading your looks...</div>
            ) : savedOutfits.length === 0 ? (
              <div style={{border:"1px dashed #EBEBEB",borderRadius:"8px",padding:"32px",textAlign:"center"}}>
                <div style={{fontSize:"32px",marginBottom:"12px"}}>👗</div>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"14px",marginBottom:"6px"}}>No saved looks yet</div>
                <div style={{fontFamily:"'Inter',sans-serif",fontSize:"11px",color:"#444",marginBottom:"16px"}}>Style an outfit and tap ❤ to save it here</div>
                <button onClick={onNavigateToCatalog} style={{background:"#6B7B8D",color:"#FFFFFF",border:"none",padding:"10px 20px",fontFamily:"'Inter',sans-serif",fontSize:"10px",fontWeight:700,cursor:"pointer",borderRadius:"4px",letterSpacing:"0.08em"}}>START STYLING →</button>
              </div>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
                {savedOutfits.map((fav, i) => (
                  <div key={fav.id||i} style={{border:"1px solid #EBEBEB",borderRadius:"8px",padding:"16px",background:"#FAFAFA"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
                      <div>
                        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"14px",color:"#0A0A0A"}}>Look #{savedOutfits.length - i}</div>
                        <div style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",color:"#333",marginTop:"2px"}}>{fav.savedAt ? new Date(fav.savedAt).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}) : "Recently saved"}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"18px",color:"#6B7B8D"}}>${fav.total}</div>
                        <div style={{fontFamily:"'Inter',sans-serif",fontSize:"8px",color:"#333"}}>{fav.items || Object.values(fav.outfit||{}).filter(v=>v?.item?.price>0||v?.itemPrice>0).length} items</div>
                      </div>
                    </div>
                    {/* Colour swatches */}
                    <div style={{display:"flex",gap:"4px",flexWrap:"wrap",marginBottom:"12px"}}>
                      {Object.entries(fav.outfit||{}).filter(([,v])=>(v?.variantHex||v?.item?.variants?.[v?.variantIdx]?.hex) && (v?.itemPrice||v?.item?.price)>0).map(([slot,v])=>(
                        <div key={slot} title={`${slot}: ${v?.itemName||v?.item?.name}`} style={{width:"18px",height:"18px",borderRadius:"50%",background:v?.variantHex||v?.item?.variants?.[v?.variantIdx]?.hex||"#CCC",border:"1px solid #DDD",flexShrink:0}}/>
                      ))}
                    </div>
                    <div style={{display:"flex",gap:"8px"}}>
                      <button onClick={onNavigateToCatalog} style={{flex:1,background:"#6B7B8D",color:"#FFFFFF",border:"none",padding:"8px",fontFamily:"'Inter',sans-serif",fontSize:"9px",fontWeight:700,cursor:"pointer",borderRadius:"4px",letterSpacing:"0.08em"}}>WEAR THIS ✦</button>
                      <button onClick={()=>deleteOutfit(fav.id, i)} style={{background:"transparent",color:"#CC4444",border:"1px solid #FFCCCC",padding:"8px 12px",fontFamily:"'Inter',sans-serif",fontSize:"9px",cursor:"pointer",borderRadius:"4px"}}>✕</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* Orders Section */}
        {orders.length > 0 && (
          <div style={{marginBottom:"32px"}}>
            <div style={{fontFamily:"'Inter',sans-serif",fontSize:"8px",letterSpacing:"0.2em",color:"#444",marginBottom:"16px",fontWeight:700}}>YOUR ORDERS ({orders.length})</div>
            <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
              {orders.map((order, i) => {
                const statusColor = order.status==="delivered"?"#2A7A2A":order.status==="dispatched"?"#5BA4CF":order.status==="confirmed"?"#C4A882":"#888";
                const statusLabel = order.status==="delivered"?"Delivered":order.status==="dispatched"?"Dispatched":order.status==="confirmed"?"Confirmed":"Pending";
                return (
                  <div key={order.id||i} style={{border:"1px solid #EBEBEB",borderRadius:"8px",padding:"14px 16px",background:"#FAFAFA"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px"}}>
                      <div>
                        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"13px",color:"#0A0A0A"}}>#{order.orderId}</div>
                        <div style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",color:"#333",marginTop:"2px"}}>{order.createdAt ? new Date(order.createdAt).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}) : "Recently placed"}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"15px",color:"#6B7B8D"}}>₦{(order.totalAmount||0).toLocaleString()}</div>
                        <div style={{display:"inline-block",background:statusColor+"22",color:statusColor,fontFamily:"'Inter',sans-serif",fontSize:"8px",fontWeight:700,padding:"2px 8px",borderRadius:"10px",marginTop:"3px",letterSpacing:"0.06em"}}>{statusLabel.toUpperCase()}</div>
                      </div>
                    </div>
                    <div style={{fontFamily:"'Inter',sans-serif",fontSize:"10px",color:"#333"}}>
                      {order.totalItems} item{order.totalItems!==1?"s":""} · {order.delivery?.city}, {order.delivery?.state} · {order.paymentMethod==="pod"?"Pay on Delivery":order.paymentMethod==="transfer"?"Bank Transfer":"Card"}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Sign out */}
        <button onClick={onSignOut} style={{width:"100%",background:"transparent",color:"#FF4444",border:"1px solid #FFCCCC",padding:"13px",fontFamily:"'Inter',sans-serif",fontSize:"10px",letterSpacing:"0.15em",cursor:"pointer",fontWeight:700,borderRadius:"4px",transition:"all 0.2s"}}>
          🚪 SIGN OUT
        </button>
      </div>
    </div>
  );
}

const AFFILIATE_BASE = "https://tofy.style/go";
function affLink(itemId, brand, url) {
  // In production this would hit a real redirect/tracking endpoint
  const ref = encodeURIComponent(`tofy_${itemId}_${brand}`);
  return url ? `${url}?ref=${ref}` : `${AFFILIATE_BASE}?item=${itemId}&brand=${encodeURIComponent(brand)}&ref=${ref}`;
}
function trackClick(itemId, brand) {
  // Track in Firestore (fire-and-forget) + localStorage fallback
  fb.db.trackAffiliateClick(itemId, brand).catch(() => {
    try {
      const key = "tofy_aff_clicks";
      const clicks = JSON.parse(localStorage.getItem(key) || "{}");
      clicks[itemId] = (clicks[itemId] || 0) + 1;
      localStorage.setItem(key, JSON.stringify(clicks));
    } catch {}
  });
}
