              <div style={{gridColumn:"1/-1"}}>
                <label style={{fontFamily:"'Inter',sans-serif",fontSize:"10px",fontWeight:600,letterSpacing:"0.1em",color:"#555",display:"block",marginBottom:"6px"}}>TELL US ABOUT YOUR BRAND</label>
                <textarea placeholder="Brief description of your brand, price range, target market..." value={formState.message}
                  onChange={e=>setFormState(s=>({...s,message:e.target.value}))}
                  rows={3} style={{width:"100%",padding:"10px 12px",border:"1px solid #DDD",borderRadius:"6px",fontFamily:"'Inter',sans-serif",fontSize:"12px",outline:"none",resize:"vertical",boxSizing:"border-box"}}/>
              </div>
              <div style={{gridColumn:"1/-1"}}>
                {submitError && <div style={{background:"#FFF0F0",border:"1px solid #FFAAAA",borderRadius:"6px",padding:"10px 14px",fontFamily:"'Inter',sans-serif",fontSize:"11px",color:"#CC3333",marginBottom:"12px"}}>{submitError}</div>}
                <button onClick={handleSubmit} disabled={submitting} style={{background:submitting?"#888":"#0A0A0A",color:"#FFFFFF",border:"none",padding:"14px 32px",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"12px",letterSpacing:"0.12em",cursor:submitting?"not-allowed":"pointer",borderRadius:"6px",transition:"background 0.2s"}}>
                  {submitting ? "SUBMITTING..." : "SUBMIT APPLICATION →"}
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── BRAND DASHBOARD ───────────────────────────────────────────────────────────
function BrandDashboard({ onBack, user }) {
  const [dashTab, setDashTab] = useState("overview");
  const [products, setProducts] = useState([]);
  const fileInputRef = React.useRef(null);
  const [loadingProducts, setLoadingProducts] = useState(true);
  const [saveError, setSaveError] = useState("");
  const [showAddProduct, setShowAddProduct] = useState(false);
  const [newProduct, setNewProduct] = useState({ name:"", category:"Top", price:"", stock:"", affLink:"", imageUrl:"" });

  // Brand ID — use uid if logged in, fallback for demo
  const brandId = user?.uid || "demo_brand";

  // Load products from Firestore on mount
  useEffect(() => {
    setLoadingProducts(true);
    fb.db.getBrandProducts(brandId)
      .then(ps => {
        if (ps.length > 0) {
          setProducts(ps);
        } else {
          // Seed with demo data on first load
          setProducts([
            { id:"p1", name:"Aso-Oke Blazer",  category:"Top",      price:24000, stock:12, clicks:142, sales:8,  affLink:"https://yourbrand.com/aso-blazer" },
            { id:"p2", name:"Ankara Wide-Leg",  category:"Trousers", price:18500, stock:7,  clicks:98,  sales:5,  affLink:"https://yourbrand.com/ankara-wide" },
            { id:"p3", name:"Lagos Street Tee", category:"Top",      price:8900,  stock:30, clicks:215, sales:21, affLink:"https://yourbrand.com/street-tee" },
          ]);
        }
      })
      .catch(() => {
        // Firestore unavailable — use demo data
        setProducts([
          { id:"p1", name:"Aso-Oke Blazer",  category:"Top",      price:24000, stock:12, clicks:142, sales:8,  affLink:"https://yourbrand.com/aso-blazer" },
          { id:"p2", name:"Ankara Wide-Leg",  category:"Trousers", price:18500, stock:7,  clicks:98,  sales:5,  affLink:"https://yourbrand.com/ankara-wide" },
          { id:"p3", name:"Lagos Street Tee", category:"Top",      price:8900,  stock:30, clicks:215, sales:21, affLink:"https://yourbrand.com/street-tee" },
        ]);
      })
      .finally(() => setLoadingProducts(false));
  }, [brandId]);

  const totalClicks  = products.reduce((s,p)=>s+p.clicks,0);
  const totalSales   = products.reduce((s,p)=>s+p.sales,0);
  const totalRevenue = products.reduce((s,p)=>s+p.sales*p.price,0);
  const convRate     = totalClicks > 0 ? ((totalSales/totalClicks)*100).toFixed(1) : "0.0";

  const OVERVIEW_STATS = [
    { label:"Total Clicks",    value:totalClicks.toLocaleString(),       icon:"👆", color:"#E8F4FF" },
    { label:"Total Sales",     value:totalSales,                         icon:"🛍", color:"#E8F9EE" },
    { label:"Revenue",         value:"₦"+totalRevenue.toLocaleString(),  icon:"💰", color:"#FFF8E8" },
    { label:"Conv. Rate",      value:convRate+"%",                       icon:"📈", color:"#F5E8FF" },
  ];

  const CATEGORIES = ["Top","Trousers","Shoes","Jacket","Bag","Accessory","Hair"];

  const addProduct = async () => {
    if (!newProduct.name || !newProduct.price) return;
    setSaveError("");
    const tempId = "p" + Date.now();
    const p = {
      id: tempId,
      name: newProduct.name,
      category: newProduct.category,
      price: parseInt(newProduct.price),
      stock: parseInt(newProduct.stock) || 0,
      active: true,
      clicks: 0, sales: 0,
      affLink: newProduct.affLink || affLink(tempId, newProduct.name, ""),
      imageUrl: newProduct.imageUrl || "",
    };
    // Optimistic UI — add immediately
    setProducts(ps => [...ps, p]);
    setNewProduct({ name:"", category:"Top", price:"", stock:"", affLink:"", imageUrl:"", imageUploading:false });
    setShowAddProduct(false);
    // Persist to Firestore
    try {
      const firestoreId = await fb.db.addBrandProduct(brandId, p);
      if (firestoreId) {
        // Update local ID with real Firestore ID
        setProducts(ps => ps.map(x => x.id === tempId ? { ...x, id: firestoreId } : x));
      }
    } catch(e) {
      console.error("Save product error:", e);
      setSaveError("Product saved locally but couldn't sync to cloud. Check your connection.");
    }
  };

  const deleteProduct = async (productId) => {
    setProducts(ps => ps.filter(p => p.id !== productId));
    try { await fb.db.deleteBrandProduct(productId); } catch(e) { console.error("Delete error:", e); }
  };

  const DASH_TABS = [
    {id:"overview",label:"Overview",icon:"📊"},
    {id:"products",label:"Products",icon:"🏷"},
    {id:"analytics",label:"Analytics",icon:"📈"},
    {id:"settings",label:"Settings",icon:"⚙"},
  ];

  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#F8FAFB",fontFamily:"'Inter',sans-serif"}}>
      {/* Header */}
      <div style={{background:"#0A0A0A",padding:"16px 24px",display:"flex",alignItems:"center",gap:"16px",flexShrink:0}}>
        <button onClick={onBack} style={{background:"none",border:"1px solid #333",padding:"6px 14px",cursor:"pointer",fontFamily:"'Inter',sans-serif",fontSize:"10px",color:"#444",borderRadius:"4px",letterSpacing:"0.08em"}}>← BACK</button>
        <div>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"16px",color:"#FFFFFF"}}>Brand Dashboard</div>
          <div style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",color:"#5BA4CF",letterSpacing:"0.12em"}}>TOFY PARTNER PORTAL</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:"10px"}}>
          <div style={{background:"#1A2A1A",border:"1px solid #2A4A2A",borderRadius:"20px",padding:"4px 12px",fontFamily:"'Inter',sans-serif",fontSize:"9px",color:"#4AE080",fontWeight:600}}>● ACTIVE</div>
          <div style={{fontFamily:"'Inter',sans-serif",fontSize:"10px",color:"#444"}}>{user?.email || "brand@example.com"}</div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{background:"#FFFFFF",borderBottom:"1px solid #EBEBEB",display:"flex",padding:"0 24px",overflowX:"auto",flexShrink:0}}>
        {DASH_TABS.map(t => (
          <button key={t.id} onClick={()=>setDashTab(t.id)} style={{
            flexShrink:0,background:"none",border:"none",padding:"12px 16px",cursor:"pointer",
            fontFamily:"'Inter',sans-serif",fontSize:"10px",letterSpacing:"0.08em",fontWeight:dashTab===t.id?700:400,
            color:dashTab===t.id?"#0A0A0A":"#999",
            borderBottom:dashTab===t.id?"3px solid #5BA4CF":"3px solid transparent",
            display:"flex",alignItems:"center",gap:"6px",
          }}>
            <span>{t.icon}</span>{t.label.toUpperCase()}
          </button>
        ))}
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"24px"}}>

        {/* OVERVIEW */}
        {dashTab === "overview" && (
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:"14px",marginBottom:"28px"}}>
              {OVERVIEW_STATS.map(s => (
                <div key={s.label} style={{background:"#FFFFFF",borderRadius:"10px",padding:"18px",border:"1px solid #EBEBEB",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
                  <div style={{fontSize:"22px",marginBottom:"8px"}}>{s.icon}</div>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"20px",color:"#0A0A0A"}}>{s.value}</div>
                  <div style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",color:"#555",letterSpacing:"0.08em",marginTop:"2px"}}>{s.label.toUpperCase()}</div>
                </div>
              ))}
            </div>
            {/* Top products */}
            <div style={{background:"#FFFFFF",borderRadius:"10px",padding:"20px",border:"1px solid #EBEBEB"}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"13px",marginBottom:"16px"}}>Top Performing Products</div>
              {[...products].sort((a,b)=>b.sales-a.sales).map(p => (
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:"12px",padding:"10px 0",borderBottom:"1px solid #F5F5F5"}}>
                  <div style={{width:"36px",height:"36px",borderRadius:"8px",background:"#F0F4FF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"16px",flexShrink:0}}>🏷</div>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:"'Inter',sans-serif",fontSize:"12px",fontWeight:600,color:"#0A0A0A"}}>{p.name}</div>
                    <div style={{fontFamily:"'Inter',sans-serif",fontSize:"10px",color:"#555"}}>{p.category} · ₦{p.price.toLocaleString()}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontFamily:"'Inter',sans-serif",fontSize:"12px",fontWeight:700,color:"#0A0A0A"}}>{p.sales} sales</div>
                    <div style={{fontFamily:"'Inter',sans-serif",fontSize:"10px",color:"#444"}}>{p.clicks} clicks</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* PRODUCTS */}
        {dashTab === "products" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"14px"}}>Your Products ({products.length})</div>
              <button onClick={()=>setShowAddProduct(true)} style={{background:"#0A0A0A",color:"#FFFFFF",border:"none",padding:"10px 18px",fontFamily:"'Inter',sans-serif",fontSize:"10px",fontWeight:700,letterSpacing:"0.1em",cursor:"pointer",borderRadius:"6px"}}>+ ADD PRODUCT</button>
            </div>
            {showAddProduct && (
              <div style={{background:"#FFFFFF",border:"2px solid #5BA4CF",borderRadius:"10px",padding:"20px",marginBottom:"20px"}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"13px",marginBottom:"16px",color:"#0A0A0A"}}>New Product</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:"12px"}}>
                  {[
                    {key:"name",label:"Product Name",placeholder:"Aso-Oke Blazer"},
                    {key:"price",label:"Price (₦)",placeholder:"24000",type:"number"},
                    {key:"stock",label:"Stock Qty",placeholder:"10",type:"number"},
                    {key:"affLink",label:"Product URL",placeholder:"https://yourbrand.com/..."},
                  ].map(f => (
                    <div key={f.key}>
                      <label style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",fontWeight:600,letterSpacing:"0.1em",color:"#444",display:"block",marginBottom:"4px"}}>{f.label.toUpperCase()}</label>
                      <input type={f.type||"text"} placeholder={f.placeholder} value={newProduct[f.key]}
                        onChange={e=>setNewProduct(s=>({...s,[f.key]:e.target.value}))}
                        style={{width:"100%",padding:"8px 10px",border:"1px solid #DDD",borderRadius:"6px",fontFamily:"'Inter',sans-serif",fontSize:"11px",outline:"none",boxSizing:"border-box"}}/>
                    </div>
                  ))}
                  <div>
                    <label style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",fontWeight:600,letterSpacing:"0.1em",color:"#444",display:"block",marginBottom:"4px"}}>CATEGORY</label>
                    <select value={newProduct.category} onChange={e=>setNewProduct(s=>({...s,category:e.target.value}))} style={{width:"100%",padding:"8px 10px",border:"1px solid #DDD",borderRadius:"6px",fontFamily:"'Inter',sans-serif",fontSize:"11px",outline:"none",background:"#FFFFFF",boxSizing:"border-box"}}>
                      {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
                    </select>
                  </div>
                  {/* Image upload — full width */}
                  <div style={{gridColumn:"1/-1"}}>
                    <label style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",fontWeight:600,letterSpacing:"0.1em",color:"#444",display:"block",marginBottom:"8px"}}>PRODUCT IMAGE</label>
                    <div style={{display:"flex",gap:"10px",alignItems:"center",flexWrap:"wrap"}}>
                      <input
                        ref={fileInputRef}
                        type="file"
                        accept="image/*"
                        style={{display:"none"}}
                        onChange={async(e)=>{
                          const file = e.target.files?.[0];
                          if(!file) return;
                          if(file.size > 5*1024*1024){ setSaveError("Image must be under 5MB"); return; }
                          setSaveError("");
                          setNewProduct(s=>({...s,imageUploading:true}));
                          try {
                            const url = await fb.db.uploadProductImage(file, brandId);
                            setNewProduct(s=>({...s,imageUrl:url,imageUploading:false}));
                          } catch(err) {
                            setSaveError("Upload failed — paste an image URL instead");
                            setNewProduct(s=>({...s,imageUploading:false}));
                          }
                          // Reset input so same file can be re-selected
                          if(fileInputRef.current) fileInputRef.current.value = "";
                        }}
                      />
                      <button
                        disabled={newProduct.imageUploading}
                        onClick={()=>{ if(fileInputRef.current) fileInputRef.current.click(); }}
                        style={{background:newProduct.imageUploading?"#888":"#5BA4CF",color:"#FFFFFF",padding:"10px 16px",borderRadius:"6px",fontFamily:"'Inter',sans-serif",fontSize:"11px",fontWeight:700,cursor:newProduct.imageUploading?"not-allowed":"pointer",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:"6px",border:"none",flexShrink:0}}
                      >
                        {newProduct.imageUploading ? "⏳ Uploading..." : "📷 Upload Photo"}
                      </button>
                      <span style={{fontFamily:"'Inter',sans-serif",fontSize:"10px",color:"#888"}}>or</span>
                      <input type="text" placeholder="Paste image URL..." value={newProduct.imageUrl}
                        onChange={e=>setNewProduct(s=>({...s,imageUrl:e.target.value}))}
                        style={{flex:1,minWidth:"160px",padding:"9px 10px",border:"1px solid #DDD",borderRadius:"6px",fontFamily:"'Inter',sans-serif",fontSize:"11px",outline:"none",boxSizing:"border-box"}}/>
                    </div>
                    {newProduct.imageUrl && !newProduct.imageUploading && (
                      <div style={{marginTop:"10px",display:"flex",gap:"10px",alignItems:"center",background:"#F0FFF4",border:"1px solid #A8E0BC",borderRadius:"8px",padding:"8px 12px"}}>
                        <img src={newProduct.imageUrl} alt="Preview" onError={e=>e.target.style.display="none"} style={{width:"52px",height:"52px",objectFit:"cover",borderRadius:"6px",border:"1px solid #DDD",flexShrink:0}}/>
                        <div style={{fontFamily:"'Inter',sans-serif",fontSize:"10px",color:"#2A6A3A",flex:1}}>✅ Image ready — looks good in the catalog!</div>
                        <button onClick={()=>setNewProduct(s=>({...s,imageUrl:""}))} style={{background:"none",border:"none",cursor:"pointer",color:"#888",fontSize:"16px"}}>✕</button>
                      </div>
                    )}
                  </div>
                </div>
                <div style={{display:"flex",gap:"10px",marginTop:"16px"}}>
                  <button onClick={addProduct} style={{background:"#0A0A0A",color:"#FFFFFF",border:"none",padding:"10px 20px",fontFamily:"'Inter',sans-serif",fontSize:"10px",fontWeight:700,cursor:"pointer",borderRadius:"6px",letterSpacing:"0.08em"}}>SAVE PRODUCT</button>
                  <button onClick={()=>setShowAddProduct(false)} style={{background:"#F5F5F5",color:"#333",border:"1px solid #DDD",padding:"10px 16px",fontFamily:"'Inter',sans-serif",fontSize:"10px",cursor:"pointer",borderRadius:"6px"}}>Cancel</button>
                </div>
              </div>
            )}
            <div style={{display:"flex",flexDirection:"column",gap:"10px"}}>
              {products.map(p => (
                <div key={p.id} style={{background:"#FFFFFF",borderRadius:"10px",padding:"16px",border:"1px solid #EBEBEB",display:"grid",gridTemplateColumns:"1fr auto",gap:"12px",alignItems:"center"}}>
                  <div style={{display:"flex",gap:"12px",alignItems:"flex-start"}}>
                    {p.imageUrl ? (
                      <img src={p.imageUrl} alt={p.name} style={{width:"52px",height:"52px",objectFit:"cover",borderRadius:"8px",border:"1px solid #EBEBEB",flexShrink:0}}/>
                    ) : (
                      <div style={{width:"52px",height:"52px",borderRadius:"8px",background:"#F0F4FF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",flexShrink:0}}>🏷</div>
                    )}
                    <div>
                    <div style={{fontFamily:"'Inter',sans-serif",fontSize:"13px",fontWeight:600,color:"#0A0A0A",marginBottom:"4px"}}>{p.name}</div>
                    <div style={{display:"flex",gap:"10px",flexWrap:"wrap"}}>
                      <span style={{fontFamily:"'Inter',sans-serif",fontSize:"10px",color:"#444"}}>{p.category}</span>
                      <span style={{fontFamily:"'Inter',sans-serif",fontSize:"10px",color:"#0A0A0A",fontWeight:600}}>₦{p.price.toLocaleString()}</span>
                      <span style={{fontFamily:"'Inter',sans-serif",fontSize:"10px",color:p.stock<5?"#E05050":"#888"}}>Stock: {p.stock}</span>
                    </div>
                    <div style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",color:"#5BA4CF",marginTop:"4px",wordBreak:"break-all"}}>{affLink(p.id,"brand",p.affLink)}</div>
                  </div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:"4px"}}>
                    <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"16px",color:"#0A0A0A"}}>{p.sales}</div>
                    <div style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",color:"#555"}}>SALES</div>
                    <div style={{fontFamily:"'Inter',sans-serif",fontSize:"11px",color:"#444"}}>{p.clicks} clicks</div>
                    <button onClick={()=>deleteProduct(p.id)} style={{background:"none",border:"1px solid #FFD0D0",color:"#CC4444",padding:"3px 8px",borderRadius:"4px",fontFamily:"'Inter',sans-serif",fontSize:"9px",cursor:"pointer",marginTop:"4px"}}>✕ remove</button>
                  </div>
                </div>
              ))}
              {saveError && <div style={{background:"#FFF0F0",border:"1px solid #FFAAAA",borderRadius:"6px",padding:"10px",fontFamily:"'Inter',sans-serif",fontSize:"11px",color:"#CC3333",marginTop:"8px"}}>{saveError}</div>}
              {loadingProducts && <div style={{textAlign:"center",padding:"20px",fontFamily:"'Inter',sans-serif",fontSize:"11px",color:"#555"}}>Loading products...</div>}
            </div>
          </div>
        )}

        {/* ANALYTICS */}
        {dashTab === "analytics" && (
          <div>
            <div style={{background:"#FFFFFF",borderRadius:"10px",padding:"24px",border:"1px solid #EBEBEB",marginBottom:"16px"}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"13px",marginBottom:"20px"}}>Click-to-Sale Funnel</div>
              {products.map(p => {
                const rate = p.clicks > 0 ? Math.round((p.sales/p.clicks)*100) : 0;
                return (
                  <div key={p.id} style={{marginBottom:"18px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:"5px"}}>
                      <div style={{fontFamily:"'Inter',sans-serif",fontSize:"11px",fontWeight:600}}>{p.name}</div>
                      <div style={{fontFamily:"'Inter',sans-serif",fontSize:"11px",color:"#444"}}>{p.clicks} clicks → {p.sales} sales ({rate}%)</div>
                    </div>
                    <div style={{background:"#F0F0F0",borderRadius:"4px",height:"8px",overflow:"hidden"}}>
                      <div style={{background:"#5BA4CF",height:"100%",width:rate+"%",borderRadius:"4px",transition:"width 0.6s ease"}}/>
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{background:"#0A0A0A",borderRadius:"10px",padding:"24px",color:"#FFFFFF"}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"13px",marginBottom:"12px",color:"#5BA4CF"}}>Affiliate Tracking</div>
              <div style={{fontFamily:"'Inter',sans-serif",fontSize:"11px",color:"rgba(255,255,255,0.7)",lineHeight:1.8}}>
                Every product link generated by TOFY includes your brand tracking ID. When users click through and purchase, the sale is attributed back to TOFY for accurate commission calculation. Full API access available on Partner and Premier tiers.
              </div>
              <div style={{marginTop:"16px",display:"flex",gap:"24px",flexWrap:"wrap"}}>
                <div><div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"20px",color:"#FFFFFF"}}>{totalClicks}</div><div style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",color:"#333",letterSpacing:"0.08em"}}>TRACKED CLICKS</div></div>
                <div><div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"20px",color:"#FFFFFF"}}>{totalSales}</div><div style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",color:"#333",letterSpacing:"0.08em"}}>ATTRIBUTED SALES</div></div>
                <div><div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"20px",color:"#5BA4CF"}}>₦{(totalRevenue*0.08).toLocaleString()}</div><div style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",color:"#333",letterSpacing:"0.08em"}}>TOFY COMMISSION (8%)</div></div>
              </div>
            </div>
          </div>
        )}

        {/* SETTINGS */}
        {dashTab === "settings" && (
          <div style={{background:"#FFFFFF",borderRadius:"10px",padding:"24px",border:"1px solid #EBEBEB"}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"14px",marginBottom:"20px"}}>Brand Settings</div>
            {[
              {label:"Brand Name",value:"My Brand",placeholder:"Your brand name"},
              {label:"Website",value:"",placeholder:"https://yourbrand.com"},
              {label:"Instagram Handle",value:"",placeholder:"@yourbrand"},
              {label:"Payout Account (Bank)",value:"",placeholder:"GTBank · 0123456789"},
            ].map(f => (
              <div key={f.label} style={{marginBottom:"16px"}}>
                <label style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",fontWeight:600,letterSpacing:"0.1em",color:"#444",display:"block",marginBottom:"5px"}}>{f.label.toUpperCase()}</label>
                <input defaultValue={f.value} placeholder={f.placeholder} style={{width:"100%",padding:"10px 12px",border:"1px solid #DDD",borderRadius:"6px",fontFamily:"'Inter',sans-serif",fontSize:"12px",outline:"none",boxSizing:"border-box"}}/>
              </div>
            ))}

}

function TofyApp() {
  const [page, setPage] = useState("home");
  const [menuOpen, setMenuOpen] = useState(false);
  const [isMob, setIsMob] = useState(() => window.innerWidth < 769);
  useEffect(() => {
    const fn = () => setIsMob(window.innerWidth < 769);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);

  // One-time tour + quiz — skipped for returning users
  const [hasSeenTour, setHasSeenTour] = useState(() => {
    try { return localStorage.getItem("tofy_tour_done") === "true"; } catch { return false; }
  });
  const [showTour, setShowTour]       = useState(() => {
    try { return localStorage.getItem("tofy_tour_done") !== "true"; } catch { return true; }
  });
  const [tourStep, setTourStep]       = useState(0);
  const [showOnboarding, setShowOnboarding] = useState(() => {
    // Only show quiz if tour is done and quiz not yet completed
    try {
      return localStorage.getItem("tofy_tour_done") === "true" &&
             localStorage.getItem("tofy_style_profile") === null;
    } catch { return false; }
  });
  const [ndaAccepted, setNdaAccepted] = useState(() => {
    try { return localStorage.getItem("tofy_nda_accepted") === "true"; } catch { return false; }
  });
  const [ndaStep, setNdaStep]       = useState("document"); // document | email
  const [ndaEmail, setNdaEmail]     = useState("");
  const [ndaEmailError, setNdaEmailError] = useState("");
  const [ndaSubmitting, setNdaSubmitting] = useState(false);
  const [quizStep, setQuizStep] = useState(0);
  const [quizAnswers, setQuizAnswers] = useState({});
  const [showAuth, setShowAuth] = useState(false);

  const { user, profile, loading, signOut, saveProfile } = useAuth();

  // Avatar — load from localStorage for guests, Firebase for logged-in users
  const [globalAv, setGlobalAv] = useState(() => {
    try {
      const saved = localStorage.getItem("tofy_avatar");
      return saved ? { ...DEFAULT_AVATAR, ...JSON.parse(saved) } : DEFAULT_AVATAR;
    } catch { return DEFAULT_AVATAR; }
  });

  // Style profile from quiz — persisted across sessions
  const [styleProfile, setStyleProfile] = useState(() => {
    try { return JSON.parse(localStorage.getItem("tofy_style_profile") || "null"); } catch { return null; }
  });

  // Load style profile from Firebase when user logs in
  useEffect(() => {
    if (!user || !profile) return;
    if (profile.styleProfile) {
      setStyleProfile(profile.styleProfile);
      try { localStorage.setItem("tofy_style_profile", JSON.stringify(profile.styleProfile)); } catch {}
    }
  }, [user?.uid, profile]);

  // Save style profile when quiz completes
  useEffect(() => {
    const QUIZ_LEN = 3;
    if (quizStep === QUIZ_LEN && Object.keys(quizAnswers).length === QUIZ_LEN) {
      if (user) fb.db.saveProfile(user.uid, { styleProfile: quizAnswers, updatedAt: new Date().toISOString() });
      try { localStorage.setItem("tofy_style_profile", JSON.stringify(quizAnswers)); } catch {}
      setStyleProfile(quizAnswers);
      // Don't show tour again — quiz is done
    }
  }, [quizStep]);
  const [avatarSaved, setAvatarSaved] = useState(false);

  // Load avatar from Firebase when user logs in
  useEffect(() => {
    if (!user) return;
    fb.db.getAvatar(user.uid).then(av => {
      if (av) {
        const { updatedAt, ...avatarData } = av;
        setGlobalAv(a => ({ ...DEFAULT_AVATAR, ...avatarData }));
      }
    });
  }, [user?.uid]);

  // Debounced auto-save whenever avatar changes
  useEffect(() => {
    try { localStorage.setItem("tofy_avatar", JSON.stringify(globalAv)); } catch {}
    if (!user) return;
    const t = setTimeout(() => {
      fb.db.saveAvatar(user.uid, globalAv).then(() => {

              <div style={{background:"#0A0A0A",padding:"22px 28px 18px",position:"relative"}}>
                <div style={{position:"absolute",inset:0,backgroundImage:"radial-gradient(rgba(200,244,0,0.08) 1px,transparent 1px)",backgroundSize:"20px 20px",pointerEvents:"none"}}/>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"28px",color:"#6B7B8D",letterSpacing:"0.1em",marginBottom:"2px"}}>TOFY</div>
                <div style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",color:"#E8F4FF",letterSpacing:"0.2em"}}>STYLE IT. BUY IT. OWN IT.</div>
                {/* Progress dots */}
                <div style={{display:"flex",gap:"6px",marginTop:"12px"}}>
                  {QUIZ.map((_,i) => <div key={i} style={{width:i<=quizStep?"22px":"8px",height:"4px",borderRadius:"2px",background:i<quizStep?"#6B7B8D":i===quizStep?"#6B7B8D":"#333",transition:"all 0.3s"}}/>)}
                </div>
              </div>
              <div style={{padding:"26px 28px 24px"}}>
                {!isLastQuiz ? (
                  <>
                    <div style={{fontFamily:"'Inter',sans-serif",fontSize:"9px",letterSpacing:"0.2em",color:"#333",marginBottom:"10px"}}>QUESTION {quizStep+1} OF {QUIZ.length}</div>
                    <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"20px",color:"#0A0A0A",marginBottom:"20px",lineHeight:1.3}}>{QUIZ[quizStep].q}</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"8px"}}>
                      {QUIZ[quizStep].opts.map(opt => {
                        const selected = quizAnswers[QUIZ[quizStep].key] === opt.v;
                        return (
                          <div key={opt.v} onClick={() => {
                            setQuizAnswers(a => ({...a,[QUIZ[quizStep].key]:opt.v}));
                            setTimeout(() => setQuizStep(s => s+1), 220);
                          }} style={{border:`2px solid ${selected?"#0A0A0A":"#E8E8E8"}`,borderRadius:"8px",padding:"14px 12px",cursor:"pointer",textAlign:"center",background:selected?"#0A0A0A":"#FAFAFA",transition:"all 0.15s"}}>
                            <div style={{fontSize:"24px",marginBottom:"6px"}}>{opt.e}</div>
                            <div style={{fontFamily:"'Inter',sans-serif",fontSize:"11px",fontWeight:700,color:selected?"#6B7B8D":"#333",letterSpacing:"0.05em"}}>{opt.v}</div>
                          </div>
                        );
                      })}
                    </div>
                  </>
                ) : (
                  <>
                    <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"20px",color:"#0A0A0A",marginBottom:"8px"}}>You're all set! 🎉</div>
                    <div style={{fontFamily:"'Inter',sans-serif",fontSize:"11px",color:"#444",lineHeight:1.8,marginBottom:"20px"}}>
                      {quizAnswers.vibe && <span>Vibe: <b style={{color:"#0A0A0A"}}>{quizAnswers.vibe}</b>  </span>}
                      {quizAnswers.occasion && <span>Occasion: <b style={{color:"#0A0A0A"}}>{quizAnswers.occasion}</b>  </span>}
                      {quizAnswers.palette && <span>Palette: <b style={{color:"#0A0A0A"}}>{quizAnswers.palette}</b></span>}
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:"10px",marginBottom:"20px"}}>
                      {[{n:"01",t:"Build your avatar",d:"Customise your mannequin — skin, hair, body.",ic:"🧍"},{n:"02",t:"Style your outfit",d:"500+ real pieces across 7 categories.",ic:"👗"},{n:"03",t:"Buy the whole look",d:"One checkout. Every item, together.",ic:"✦"}].map(s => (
                        <div key={s.n} style={{display:"flex",gap:"12px",alignItems:"flex-start"}}>
                          <div style={{width:"28px",height:"28px",borderRadius:"50%",background:"#6B7B8D",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Inter',sans-serif",fontSize:"8px",fontWeight:700,color:"#FFFFFF",flexShrink:0}}>{s.n}</div>
                          <div><div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"13px",marginBottom:"1px"}}>{s.t}</div><div style={{fontSize:"12px",color:"#444"}}>{s.d}</div></div>
                        </div>
                      ))}
                    </div>
                    <button onClick={() => setShowOnboarding(false)} style={{width:"100%",background:"#6B7B8D",color:"#FFFFFF",border:"none",padding:"14px",fontFamily:"'Inter',sans-serif",fontSize:"11px",letterSpacing:"0.2em",cursor:"pointer",fontWeight:700,borderRadius:"4px"}}>
                      LET'S STYLE ✦
                    </button>
                  </>
                )}
              </div>
            </div>
          </div>
        );
      })()}
      {/* ── GUIDED TOUR ── */}
      {showTour && tourStep < 4 && (() => {
        const TOUR = [
          {
            title:"Build Your Avatar",
            emoji:"🧍",
            dest:"avatar",
            action:"Go to Avatar Builder →",
            instruction:"👆 Tap any option to customise your look — skin tone, hair, body shape. This avatar is YOU.",
            highlight:"My Avatar",
          },
          {
            title:"Style Your Outfit",
            emoji:"👗",
            dest:"catalog",
            action:"Go to Style It →",
            instruction:"👆 Tap any clothing slot on the left, then pick items from the catalog on the right. Watch your avatar dress up live!",
            highlight:"Style It",
          },
          {
            title:"Buy the Whole Look",
            emoji:"🛍",
            dest:"catalog",
            action:"Open the Checkout →",
            instruction:"👆 When you love your outfit, tap the black BUY THE LOOK button at the bottom. Fill in your delivery details and place your order.",
            highlight:"BUY THE LOOK",
          },
          {
            title:"Save Your Looks",
            emoji:"❤",
            dest:"catalog",
            action:"I got it — let me explore!",
            instruction:"👆 Tap the ❤ SAVE button in the top bar to save any outfit you love. Find all your saved looks in My Profile.",
            highlight:"SAVE",
          },
        ];
        const t = TOUR[tourStep];
        return (
          <div style={{position:"fixed",inset:0,zIndex:8000,display:"flex",flexDirection:"column",justifyContent:"flex-end",fontFamily:"'Inter',sans-serif",pointerEvents:"none"}}>
            {/* Dimmed overlay — only bottom portion, so user can see the app */}
            <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.55)",pointerEvents:"all"}} onClick={()=>setShowTour(false)}/>
            {/* Tour card */}
            <div style={{position:"relative",zIndex:1,margin:"0 12px 72px",background:"#FFFFFF",borderRadius:"16px",overflow:"hidden",boxShadow:"0 -20px 60px rgba(0,0,0,0.4)",animation:"slideUp 0.3s ease",pointerEvents:"all"}}>
              {/* Header */}
              <div style={{background:"#0A0A0A",padding:"12px 18px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                  <span style={{fontSize:"20px"}}>{t.emoji}</span>
                  <div>
                    <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"14px",color:"#FFFFFF"}}>{t.title}</div>
                    <div style={{fontFamily:"'Inter',sans-serif",fontSize:"8px",color:"#5BA4CF",letterSpacing:"0.12em"}}>STEP {tourStep+1} OF {TOUR.length}</div>
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                  <div style={{display:"flex",gap:"4px"}}>
                    {TOUR.map((_,i)=>(
                      <div key={i} style={{width:i===tourStep?"16px":"5px",height:"5px",borderRadius:"3px",background:i<=tourStep?"#5BA4CF":"#333",transition:"all 0.3s"}}/>
                    ))}
                  </div>
                  <button onClick={()=>{
                  setShowTour(false);
                  try { localStorage.setItem("tofy_tour_done","true"); } catch {}
                  setShowOnboarding(true);
                }} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontFamily:"'Inter',sans-serif",fontSize:"9px",fontWeight:600,letterSpacing:"0.08em",padding:"4px 8px",borderRadius:"4px",border:"1px solid #333"}}>SKIP</button>
                </div>
              </div>
              {/* Instruction */}
              <div style={{padding:"16px 18px"}}>
                <div style={{background:"#F0F7FF",border:"1px solid #D0E8FF",borderRadius:"8px",padding:"12px 14px",marginBottom:"14px",fontFamily:"'Inter',sans-serif",fontSize:"12px",color:"#1A3A5A",lineHeight:1.7}}>
                  {t.instruction}
                </div>
                <div style={{display:"flex",gap:"8px"}}>
                  {tourStep > 0 && (
                    <button onClick={()=>{ setTourStep(s=>s-1); navigate(TOUR[tourStep-1].dest); }} style={{flex:"0 0 auto",background:"transparent",color:"#777",border:"1px solid #DDD",padding:"11px 16px",fontFamily:"'Inter',sans-serif",fontSize:"10px",cursor:"pointer",borderRadius:"8px"}}>←</button>
                  )}
                  <button onClick={()=>{
                    navigate(t.dest);
                    if(tourStep < TOUR.length - 1){ setTourStep(s=>s+1); }
                    else {
                      setShowTour(false);
                      try { localStorage.setItem("tofy_tour_done","true"); } catch {}
                      setShowOnboarding(true);
                    }
                  }} style={{flex:1,background:"#0A0A0A",color:"#FFFFFF",border:"none",padding:"12px",fontFamily:"'Syne',sans-serif",fontSize:"11px",fontWeight:800,letterSpacing:"0.1em",cursor:"pointer",borderRadius:"8px"}}>
                    {t.action}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      })()}

    </div>
  );
}
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TofyApp />);
  </script>
</body>
</html>
